name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract checks
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version
          rustup target list --installed

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run contract tests
        run: cargo test --workspace --locked

      - name: Run Clippy
        run: |
          cargo clippy \
            --workspace \
            --all-targets \
            --locked \
            -- \
            -D warnings

      - name: Install Stellar CLI 27.0.0
        env:
          STELLAR_CLI_VERSION: "27.0.0"
        run: |
          sudo apt-get update

          sudo apt-get install \
            --yes \
            --no-install-recommends \
            libdbus-1-3 \
            libudev1

          archive_name="stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"

          curl \
            --fail \
            --show-error \
            --silent \
            --location \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/${archive_name}" \
            --output "/tmp/${archive_name}"

          tar \
            --extract \
            --gzip \
            --file "/tmp/${archive_name}" \
            --directory /tmp

          sudo install \
            --mode 0755 \
            /tmp/stellar \
            /usr/local/bin/stellar

          stellar --version

      - name: Build optimized contract WASM
        run: stellar contract build --locked

      - name: Verify contract artifact
        run: |
          test -f target/wasm32v1-none/release/textbook_loan.wasm

          ls -lh \
            target/wasm32v1-none/release/textbook_loan.wasm

          sha256sum \
            target/wasm32v1-none/release/textbook_loan.wasm

      - name: Upload contract WASM
        uses: actions/upload-artifact@v5
        with:
          name: textbook-loan-contract-wasm
          path: target/wasm32v1-none/release/textbook_loan.wasm
          if-no-files-found: error
          retention-days: 14

  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: |
            packages/textbook_loan/package-lock.json
            frontend/package-lock.json

      - name: Install contract binding dependencies
        working-directory: packages/textbook_loan
        run: npm ci

      - name: Build typed contract bindings
        working-directory: packages/textbook_loan
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build production frontend
        working-directory: frontend
        run: npm run build

      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Verify frontend artifact
        run: |
          test -f frontend/dist/index.html
          du -sh frontend/dist
          find frontend/dist -maxdepth 2 -type f -print

      - name: Upload production frontend
        uses: actions/upload-artifact@v5
        with:
          name: textbook-loan-frontend
          path: frontend/dist
          if-no-files-found: error
          retention-days: 14
